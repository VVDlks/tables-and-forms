<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>
    <form action="/pets/orders" method="post">
        <label>Ваше любимое животное
            <select name="petType">
                <option value="cat">Кошка</option>
                <option value="dog">Собака</option>
                <option value="hamster">Хомяк</option>
                <option value="parrot">Попугай</option>
            </select>
        </label>

        <label>
            <input type="radio" name="gender" value="girl"> Девочка
        </label>
        <label>
            <input type="radio" name="gender" value="boy"> Мальчик
        </label>
        <label>
            <input type="radio" name="gender" value="none" checked> Не имеет значения
        </label>

        <label>Цвет глаз
            <input type="color" name="eyeColor" value="#575757">
        </label>

        <label>Длина хвоста
            <input type="number" name="tailLength" min="7" max="120" value="7">
        </label>

        <label>Имя
            <input type="text" name="name" value="Саша">
        </label>

        <label>Дата рождения
            <input type="date" name="dateOfBirth" value="1970-01-01">
        </label>

        <label>email
            <input type="email" name="email" value="dfd@gmail.vom">
        </label>

        <label>Номер телефона
            <input type="number" name="phone" value="123456789">
        </label>

        <label>
            <input type="checkbox" name="rules" value="true" required> Я согласен предоставить свои паспортные данные, и пин код от кредитки.
        </label>

        <button type="submit">
            Отправить форму
        </button>
    </form>

</main>
</body>
</html>
